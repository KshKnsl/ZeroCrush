<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Alert</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f4f7fb;
        color: #0f172a;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      .container {
        max-width: 560px;
        margin: 24px auto;
        background: #ffffff;
        border: 1px solid #e2e8f0;
      }
      .header {
        background: #0f766e;
        color: #ffffff;
        padding: 20px 24px;
      }
      .content {
        padding: 20px 24px;
        line-height: 1.6;
      }
      .meta {
        margin-top: 12px;
        padding: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }
      .footer {
        padding: 16px 24px 24px;
        color: #64748b;
        font-size: 12px;
      }
      strong {
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2 style="margin: 0; font-size: 20px">{{app}} Login Alert</h2>
      </div>
      <div class="content">
        <p style="margin-top: 0">Hello {{name}},</p>
        <p>We noticed a successful login to your {{app}} account.</p>
        <div class="meta">
          <div><strong>Email:</strong> {{email}}</div>
          <div><strong>Role:</strong> {{role}}</div>
          <div><strong>Time:</strong> {{time}}</div>
        </div>
        <p style="margin-bottom: 0">If this was not you, reset your password and contact your administrator immediately.</p>
      </div>
      <div class="footer">
        This is an automated security message from {{app}}.
      </div>
    </div>
  </body>
</html>
